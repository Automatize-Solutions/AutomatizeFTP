name: Release

# Cut a release by pushing a tag: git tag v1.0.0 && git push origin v1.0.0
# workflow_dispatch runs the full pipeline as a dry run (artifacts only, no release).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_NOLOGO: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  PROJECT: src/AutomatizeFTP.Presentation.Avalonia/AutomatizeFTP.Presentation.Avalonia.csproj

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet test src/AutomatizeFTP.slnx --nologo

  package:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rid: osx-arm64
            icon: src/AutomatizeFTP.Presentation.Avalonia/Assets/icon.icns
          - os: macos-latest
            rid: osx-x64
            icon: src/AutomatizeFTP.Presentation.Avalonia/Assets/icon.icns
          - os: windows-latest
            rid: win-x64
            icon: src/AutomatizeFTP.Presentation.Avalonia/Assets/icon.ico
          - os: ubuntu-latest
            rid: linux-x64
            icon: src/AutomatizeFTP.Presentation.Avalonia/Assets/icon-256.png
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "VERSION=0.0.0-ci.$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"
          fi

      - name: Install vpk
        run: dotnet tool install --global vpk

      - name: Publish
        shell: bash
        # No PublishSingleFile: Velopack needs the loose directory layout.
        run: |
          dotnet publish "$PROJECT" -c Release -r "${{ matrix.rid }}" \
            --self-contained -p:Version="$VERSION" -p:DebugType=none -o publish

      - name: Download previous release (delta baseline)
        shell: bash
        run: |
          vpk download github --repoUrl "https://github.com/$GITHUB_REPOSITORY" \
            --token "${{ github.token }}" --channel "${{ matrix.rid }}" \
            --outputDir releases \
            || echo "No previous release for ${{ matrix.rid }}; skipping deltas."

      - name: Pack
        shell: bash
        run: |
          MAIN_EXE="AutomatizeFTP.Presentation.Avalonia"
          EXTRA=()
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            MAIN_EXE="$MAIN_EXE.exe"
          elif [[ "${{ matrix.rid }}" == osx-* ]]; then
            # Ad-hoc signing keeps the bundle seal coherent, so Gatekeeper says
            # "unidentified developer" instead of "damaged". Replace with a
            # Developer ID identity + --notaryProfile for friction-free installs.
            EXTRA+=(--bundleId com.automatize.AutomatizeFTP --signAppIdentity=-)
          fi
          vpk pack \
            --packId AutomatizeFTP \
            --packVersion "$VERSION" \
            --packDir publish \
            --mainExe "$MAIN_EXE" \
            --packTitle AutomatizeFTP \
            --packAuthors "Automatize Solutions" \
            --icon "${{ matrix.icon }}" \
            --channel "${{ matrix.rid }}" \
            --outputDir releases \
            "${EXTRA[@]}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: releases/
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "AutomatizeFTP ${GITHUB_REF_NAME#v}" \
            --generate-notes
